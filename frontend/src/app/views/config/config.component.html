<c-container breakpoint="lg" class="h-auto px-4 config-width" fluid>
  <p class="ops-header">
    <span class="ops-welcome">Configurações</span>
    <span class="ops-access-level">Atualize suas informações pessoais e credenciais de acesso</span>
  </p>

  @if (loaded && userData) {
    <app-user-config-form
      [userData]="userData"
      (editTask)="updateConfig($event)">
    </app-user-config-form>
  } @else {
    <i>Carregando...</i>
  }
</c-container>
