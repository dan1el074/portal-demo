<c-container>
  <div class="alert-container">
    <c-alert [dismissible]="true" color="info" fade>
      Essa tela de apresentação ainda está em processo de desenvolvimento, informações meramente ilustrativas.
    </c-alert>
  </div>

  @if (user) {
    <app-hello
      [userName]="user.name"
      [userEmail]="user.email"
      [pendingTodos]="5"
      [upcomingEvents]="1"
      [unreadMessages]="2"
      [openChecklists]="3"
    ></app-hello>
  }

  <div class="home-container">
    <div class="home left">
      <app-files [files]="files" class="card"></app-files>
      <app-event [event]="event" class="card sticky-card"></app-event>
    </div>

    <div class="home right">
      <app-todo [tabs]="todoItems" class="card"></app-todo>

      @for (post of feed; track post.id) {
        <app-post [post]="post" class="card"></app-post>
      }
    </div>
  </div>
</c-container>
