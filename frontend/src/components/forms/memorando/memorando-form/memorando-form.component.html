<form [formGroup]="createForm" autocomplete="off">
  <h4 class="mb-4">Novo Memorando</h4>

  <div [cFormFloating]="true" class="mb-3">
    <input cFormControl readOnly formControlName="request" [valid]="!showErrors ? undefined: createForm.get('request')?.errors != null ? false : undefined" id="request" type="text" placeholder="00000" />
    <label cLabel for="name">Número do pedido</label>
  </div>

  <div [cFormFloating]="true" class="mb-3">
    <input cFormControl readOnly formControlName="client" [valid]="!showErrors ? undefined: createForm.get('client')?.errors != null ? false : undefined" id="client" type="text" placeholder="Cliente" />
    <label cLabel for="name">Cliente</label>
  </div>

  <c-multi-select
    multiple
    selectionType="text"
    searchNoResultsLabel="Não encontrado"
    placeholder="Itens"
    [selectAll]="false"
    [valid]="!showErrors ? undefined : createForm.get('items')?.errors != null ? false : undefined"
    formControlName="items"
    class="custom-select none-cleaner mb-3"
  >
    @for (orderInfo of orderInfoList; track orderInfo.item) {
      <c-multi-select-option [value]="orderInfo.item">
        {{ orderInfo.item }}
      </c-multi-select-option>
    }
  </c-multi-select>

  <div [cFormFloating]="true" class="mb-3">
    <input cFormControl formControlName="title" [valid]="!showErrors ? undefined: createForm.get('title')?.errors != null ? false : undefined" id="title" type="text" placeholder="Título" />
    <label cLabel for="name">Título</label>
  </div>

  <div [cFormFloating]="true" class="mb-3">
    <textarea
      cFormControl
      formControlName="description"
      rows="5" [valid]="!showErrors ? undefined: createForm.get('description')?.errors != null ? false : undefined"
      class="fix-height"
      id="description"
      type="text"
      placeholder="Descrição">
    </textarea>
    <label cLabel for="name">Descrição</label>
  </div>

  <div [cFormFloating]="true" class="mb-3">
    <input cFormControl formControlName="reason" [valid]="!showErrors ? undefined: createForm.get('reason')?.errors != null ? false : undefined" id="reason" type="text" placeholder="Motivo" />
    <label cLabel for="name">Motivo</label>
  </div>

  <c-multi-select
    multiple
    selectionType="text"
    searchNoResultsLabel="Não encontrado"
    placeholder="Departamentos"
    [selectAll]="false"
    [valid]="!showErrors ? undefined : createForm.get('departments')?.errors != null ? false : undefined"
    formControlName="departments"
    class="custom-select none-cleaner mb-3"
  >
    @for (department of departments; track department.id) {
      <c-multi-select-option [value]="department.id">
        {{ department.name }}
      </c-multi-select-option>
    }
  </c-multi-select>

  <div class="button-container">
    <button cButton color="secondary" (click)="onExit()">Cancelar</button>
    <button cButton color="info" class="fix-info" (click)="onSave()">Salvar</button>
    <button cButton color="primary" (click)="onPublish()">Publicar</button>
  </div>
</form>
