<mat-form-field appearance="outline" class="search" [class.no-margin]="noMargin">
  <span matPrefix>
    <svg [cIcon]="icons.cilSearch" size="lg"></svg>
  </span>

  <input matInput (keyup)="applyFilter($event)" placeholder="Buscar">
</mat-form-field>

<c-container class="scroll-x" fluid>
  <table mat-table [dataSource]="dataSource" matSort class="table stripe">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
      <td mat-cell *matCellDef="let user">
        <c-avatar [src]="user.picture || '.\\assets\\images\\avatars\\default.png'" />
        {{ user.name }}
      </td>
    </ng-container>
    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Usuário</th>
      <td mat-cell *matCellDef="let user">{{ user.username }}</td>
    </ng-container>
    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Cargo</th>
      <td mat-cell *matCellDef="let user">{{ user.position }}</td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>E-mail</th>
      <td mat-cell *matCellDef="let user">{{ user.email }}</td>
    </ng-container>
    <ng-container matColumnDef="updateAt">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Modificado</th>
      <td mat-cell *matCellDef="let user">{{ user.updateAt | date: "dd/MM/yyyy" : '-0300' }}</td>
    </ng-container>
    <ng-container matColumnDef="activated">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let user" class="btn-container multiple">
        <button color="secondary" cButton class="custom-btn">
          <svg [cIcon]="icons.cilPencil" size="sm"></svg>
        </button>
        <button cButton cModalToggle="staticBackdropModal-{{ user.id }}" color="secondary" class="custom-btn delete">
          <svg [cIcon]="icons.cilX" size="sm"></svg>
        </button>

        <app-user-delete-modal [user]="user"></app-user-delete-modal>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let user; columns: displayedColumns"></tr>
  </table>
</c-container>

<mat-paginator [pageSize]="10" [pageSizeOptions]="[10, 20, 30]" class="pagination"></mat-paginator>
