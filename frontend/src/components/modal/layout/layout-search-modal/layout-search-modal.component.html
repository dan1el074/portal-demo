<c-modal [visible]="visible" alignment="top" backdrop="static" id="newSearchModal" scrollable>
  <c-modal-header>
    <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" class="search-buttom-icon">
      <circle cx="11" cy="11" r="8" stroke="currentColor" fill="none" stroke-width="1.4"></circle>
      <path d="m21 21-4.3-4.3" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
    </svg>
    <form autocomplete="off" class="search-form">
      <input [(ngModel)]="searchInput" (ngModelChange)="onSearchChange($event)" name="searchInput" placeholder="Buscar..." class="search-input" type="text">

      @if (searchInput.length) {
        <button class="action-search-button" (click)="onSubmit(searchInput)">
          <svg [cIcon]="icons.cilCursor" size="lg"></svg>
        </button>
      }

    </form>
    <button (click)="closeSearchModal()" cButtonClose></button>
  </c-modal-header>
  <c-modal-body class="search-body">

    @if (showResult) {
      @if (loadSeach) {
        <div cPlaceholderAnimation="glow">
          <span cCol="2" cPlaceholder></span>
          <ul class="search-container">
            <li class="search-item">
                <span cCol="6" cPlaceholder></span>
            </li>
          </ul>
        </div>
      } @else {
        @if (resultList.length) {
          <span class="title">Projetos</span>
          <ul class="search-container">
            @for(result of resultList; track result) {
              <li class="search-item" (click)="openPdf(result)">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"></path>
                    <path d="M14 2v4a2 2 0 0 0 2 2h4"></path>
                    <path d="M10 9H8"></path>
                    <path d="M16 13H8"></path>
                    <path d="M16 17H8"></path>
                  </svg>
                  <span>{{ result }}</span>
              </li>
            }
          </ul>
        } @else {
          <span>Não encontrado.</span>
        }
      }
    } @else {
      <span>Projetos, ferramentas, eventos, etc.</span>
    }

  </c-modal-body>
</c-modal>
